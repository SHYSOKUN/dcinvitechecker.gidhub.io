<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discord Invite Checker</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: linear-gradient(-45deg, #0f172a, #1e1f22, #111214, #1a1b1e);
      background-size: 400% 400%;
      animation: gradientMove 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #ffffff;
    }

    .card {
      background: #1e1f22;
      padding: 40px;
      border-radius: 24px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
      border: 1px solid rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
      to { opacity: 1; transform: translateY(0); }
    

    h1 {
      text-align: center;
      margin: 0;
      font-weight: 700;
      font-size: 26px;
    }

    p {
      text-align: center;
      font-size: 14px;
      color: #b5bac1;
      margin-top: 8px;
    }

    .top-bar {
      display: flex;
      justify-content: flex-end;
      margin-bottom: 15px;
    }

    select {
      background: #111214;
      color: white;
      border: 1px solid #2b2d31;
      padding: 8px 10px;
      border-radius: 10px;
      cursor: pointer;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-top: 30px;
    }

    input {
      flex: 1;
      padding: 14px 16px;
      border-radius: 14px;
      border: 1px solid #2b2d31;
      background: #111214;
      color: #fff;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #5865f2;
      box-shadow: 0 0 0 2px rgba(88,101,242,0.3);
    }

    button {
      padding: 14px 20px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: #5865f2;
      color: white;
      font-weight: 600;
      font-size: 14px;
      transition: 0.2s;
    }

    button:hover { background: #4752c4; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }

    .result {
      margin-top: 25px;
      padding: 18px;
      border-radius: 16px;
      font-size: 14px;
    }

    .success {
      background: rgba(59,165,93,0.15);
      border: 1px solid rgba(59,165,93,0.4);
      color: #3ba55d;
    }

    .error {
      background: rgba(237,66,69,0.15);
      border: 1px solid rgba(237,66,69,0.4);
      color: #ed4245;
    }

    .server-name {
      font-weight: 600;
      margin-top: 6px;
      color: #fff;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="top-bar">
      <select id="languageSelect" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
        <option value="ja">日本語</option>
        <option value="ko">한국어</option>
      </select>
    </div>

    <h1 id="title">Discord Invite Checker</h1>
    <p id="subtitle">Instantly check if a Discord invite link is valid</p>

    <div class="input-group">
      <input type="text" id="inviteInput" placeholder="https://discord.com/invite/abc123" />
      <button onclick="checkInvite()" id="checkBtn">Check</button>
    </div>

    <div id="output"></div>
  </div>

  <script>
    const translations = {
      en: {
        title: "Discord Invite Checker",
        subtitle: "Instantly check if a Discord invite link is valid",
        placeholder: "Enter Discord invite link...",
        check: "Check",
        checking: "Checking...",
        valid: "Invite is valid",
        invalid: "Invite is invalid or expired",
        error: "Error while checking invite",
        enter: "Please enter an invite link",
        members: "Members",
        online: "Online"
      },
      de: {
        title: "Discord Invite Checker",
        subtitle: "Überprüfe sofort, ob ein Discord-Invite gültig ist",
        placeholder: "Discord-Invite-Link eingeben...",
        check: "Prüfen",
        checking: "Prüfe...",
        valid: "Invite ist gültig",
        invalid: "Invite ist ungültig oder abgelaufen",
        error: "Fehler beim Überprüfen",
        enter: "Bitte gib einen Invite-Link ein",
        members: "Mitglieder",
        online: "Online"
      },
      ja: {
        title: "ディスコード招待チェッカー",
        subtitle: "招待リンクが有効かどうかを確認します",
        placeholder: "招待リンクを入力...",
        check: "確認",
        checking: "確認中...",
        valid: "招待リンクは有効です",
        invalid: "招待リンクは無効または期限切れです",
        error: "確認中にエラーが発生しました",
        enter: "招待リンクを入力してください",
        members: "メンバー",
        online: "オンライン"
      },
      ko: {
        title: "디스코드 초대 확인기",
        subtitle: "초대 링크가 유효한지 확인하세요",
        placeholder: "초대 링크 입력...",
        check: "확인",
        checking: "확인 중...",
        valid: "초대 링크가 유효합니다",
        invalid: "초대 링크가 만료되었거나 유효하지 않습니다",
        error: "확인 중 오류 발생",
        enter: "초대 링크를 입력하세요",
        members: "멤버",
        online: "온라인"
      }
    };

    let currentLang = "en";

    function changeLanguage() {
      currentLang = document.getElementById("languageSelect").value;
      const t = translations[currentLang];
      document.getElementById("title").innerText = t.title;
      document.getElementById("subtitle").innerText = t.subtitle;
      document.getElementById("inviteInput").placeholder = t.placeholder;
      document.getElementById("checkBtn").innerText = t.check;
    }

    function extractCode(url) {
      url = url.trim();
      if (url.includes("discord.gg/")) {
        return url.split("discord.gg/")[1].split("?")[0];
      }
      if (url.includes("discord.com/invite/")) {
        return url.split("discord.com/invite/")[1].split("?")[0];
      }
      return url;
    }

    async function checkInvite() {
      const t = translations[currentLang];
      const input = document.getElementById("inviteInput").value.trim();
      const output = document.getElementById("output");
      const btn = document.getElementById("checkBtn");

      if (!input) {
        output.innerHTML = `<div class="result error">${t.enter}</div>`;
        return;
      }

      const code = extractCode(input);
      btn.disabled = true;
      btn.innerText = t.checking;
      output.innerHTML = "";

      try {
        const response = await fetch(`https://discord.com/api/v10/invites/${code}?with_counts=true`);

        if (response.ok) {
          const data = await response.json();
          output.innerHTML = `
            <div class="result success">
              ✓ ${t.valid}
              <div class="server-name">${data.guild?.name || 'Unknown'}</div>
              ${t.members}: ${data.approximate_member_count ?? '-'}<br>
              ${t.online}: ${data.approximate_presence_count ?? '-'}
            </div>
          `;
        } else {
          output.innerHTML = `<div class="result error">✗ ${t.invalid}</div>`;
        }
      } catch {
        output.innerHTML = `<div class="result error">✗ ${t.error}</div>`;
      } finally {
        btn.disabled = false;
        btn.innerText = t.check;
      }
    }

    changeLanguage();
  </script>

</body>
</html>
