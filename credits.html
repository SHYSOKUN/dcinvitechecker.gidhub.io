<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Credits</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
/* ========================= */
/* GLOBAL */
/* ========================= */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', sans-serif;
  background: #000;
  color: #fff;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  overflow-x: hidden;
}

/* ========================= */
/* STAR BACKGROUND */
/* ========================= */
canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 0;
}

/* ========================= */
/* CARD */
/* ========================= */
.card {
  position: relative;
  z-index: 1;
  background: #111;
  padding: 50px 30px;
  width: 100%;
  max-width: 500px;
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
  animation:
    floatCard 4s ease-in-out infinite alternate,
    pulseCard 3s ease-in-out infinite alternate;
}

/* animations */
@keyframes floatCard {
  from { transform: translateY(0); }
  to { transform: translateY(-10px); }
}

@keyframes pulseCard {
  0% { box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8); }
  50% { box-shadow: 0 35px 80px rgba(255,28,28,0.5); }
  100% { box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
}

/* fade animation */
.fade-in {
  opacity: 0;
  transform: translateY(20px);
  animation: fadeIn 1s forwards;
}

@keyframes fadeIn {
  to { opacity: 1; transform: translateY(0); }
}

/* text */
h1 {
  text-align: center;
  margin-bottom: 12px;
  font-size: 28px;
}

p {
  text-align: center;
  color: #ccc;
  margin-bottom: 15px;
}

ul {
  padding-left: 20px;
  margin-bottom: 20px;
}

li {
  margin-bottom: 8px;
}

/* ========================= */
/* SIDE MENU */
/* ========================= */
.side-menu {
  position: fixed;
  top: 0;
  left: -260px;
  width: 260px;
  height: 100%;
  background: #111;
  padding: 50px 20px;
  display: flex;
  flex-direction: column;
  gap: 20px;
  transition: left 0.3s;
  z-index: 999;
}

.side-menu a {
  color: white;
  text-decoration: none;
  font-size: 18px;
  font-weight: 600;
  padding: 8px;
  border-radius: 8px;
  transition: 0.2s;
}

.side-menu a:hover {
  background: rgba(255,28,28,0.3);
}

/* ========================= */
/* HAMBURGER */
/* ========================= */
.hamburger {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 30px;
  cursor: pointer;
  z-index: 1000;
}

/* ========================= */
/* FOOTER */
/* ========================= */
footer {
  position: fixed;
  bottom: 10px;
  font-size: 12px;
  color: #777;
}

/* ========================= */
/* MOBILE */
/* ========================= */
@media(max-width:500px) {
  .card {
    padding: 40px 25px;
    max-width: 90%;
  }
}
</style>
</head>

<body>

<canvas id="starCanvas"></canvas>

<!-- MENU BUTTON -->
<div class="hamburger" onclick="toggleMenu()">☰</div>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">
  <a href="index.html">🏠 Home</a>
  <a href="#">💳 Credits</a>
</div>

<!-- MAIN CARD -->
<div class="card fade-in">
  <h1>Credits</h1>
  <p>Special thanks to:</p>
  <ul>
    <li>MAIN DEVS: SHYSOKUN, GODMODEDEX</li>
    <li>STAFF: VIPBusted, KORMATTO</li>
    <li>Fonts: Google Fonts – Inter</li>
    <li>Discord API Integration</li>
  </ul>
</div>

<footer>
© 2026 INVITE CHECKER • All rights reserved • Made by SHYSOKUN & C0
</footer>

<script>
/* ========================= */
/* STAR BACKGROUND */
/* ========================= */
const canvas = document.getElementById("starCanvas");
const ctx = canvas.getContext("2d");

let stars = [];
let starCount = window.innerWidth < 600 ? 30 : 60;

function resizeCanvas(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.addEventListener("resize", resizeCanvas);
resizeCanvas();

function createStars(){
  stars = [];
  for(let i=0; i<starCount; i++){
    stars.push({
      x: Math.random()*canvas.width,
      y: Math.random()*canvas.height,
      size: Math.random()*6+4,
      speed: Math.random()*3+1,
      rotation: Math.random()*360
    });
  }
}

createStars();

function drawStar(x, y, radius, rotation){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation * Math.PI/180);
  ctx.beginPath();
  for(let i=0; i<5; i++){
    ctx.lineTo(0, -radius);
    ctx.translate(0, -radius);
    ctx.rotate(Math.PI*2/5);
  }
  ctx.closePath();
  ctx.fillStyle="#ff1c1c";
  ctx.fill();
  ctx.restore();
}

function animateStars(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for(let s of stars){
    drawStar(s.x, s.y, s.size, s.rotation);
    s.y += s.speed;
    s.rotation += 5;
    if(s.y > canvas.height + s.size){
      s.y = -s.size;
      s.x = Math.random()*canvas.width;
    }
  }
  requestAnimationFrame(animateStars);
}
animateStars();

/* ========================= */
/* SIDE MENU TOGGLE */
/* ========================= */
let menuOpen = false;
function toggleMenu(){
  const menu = document.getElementById("sideMenu");
  menuOpen = !menuOpen;
  menu.style.left = menuOpen ? "0" : "-260px";
}

/* close menu when clicking outside */
document.addEventListener("click", function(e){
  const menu = document.getElementById("sideMenu");
  const button = document.querySelector(".hamburger");
  if(menuOpen && !menu.contains(e.target) && !button.contains(e.target)){
    menu.style.left = "-260px";
    menuOpen = false;
  }
});

/* keyboard shortcut: press M to toggle menu */
document.addEventListener("keydown", function(e){
  if(e.key.toLowerCase() === "m") toggleMenu();
});
</script>

</body>
</html>
